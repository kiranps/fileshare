[package]
name = "webdavserver"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.8"
base64 = "0.22.1"
chrono = "0.4.43"
http-body-util = "0.1.3"
httpdate = "1.0.3"
tokio = { version = "1.49.0", features = ["full"] }
tower-http = { version = "0.6.8", features = ["trace", "cors"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
uniffi = { version = "0.29.0", features = ["cli"] }
thiserror = "1.0.64"
async-std = "1.13.2"
rand = "0.9.2"
tracing-android = "0.2.0"
log = "0.4.29"
logger = "0.4.0"
android_logger = "0.15.1"
ctor = "0.6.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_urlencoded = "0.7.1"
xml-rs = "1.0.0"
urlencoding = "2.1.3"
url = "2.5.8"
percent-encoding = "2.3.2"
zip = "8.2.0"
walkdir = "2.5.0"
tokio-util = { version = "0.7.18", features = ["io-util"] }
webrtc = "0.17.1"
reqwest = { version = "0.13.1", default-features = false, features = ["json"] }
serde_json = "1.0"
futures-util = "0.3"
rustls = { version = "0.23.38", default-features=false, features = ["aws-lc-rs", "std", "tls12"] }


[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[dev-dependencies]
reqwest = "0.13.1"
tower = { version = "0.5.3", features = ["util"] }
quick-xml = { version = "0.39.2", features = ["serialize"] }
urlencoding = "2.1.3"
uniffi = { version = "0.29.0", features = ["build"] }
